name: CI/CD Pipeline - Bhanu Reddy (2022bcd0026)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  STUDENT_NAME: "Bhanu Reddy"
  REGISTER_NUMBER: "2022bcd0026"

jobs:
  train-and-evaluate:
    runs-on: ubuntu-latest
    outputs:
      improved: ${{ steps.compare.outputs.improved }}
    env:
      STUDENT_NAME: "Bhanu Reddy"
      REGISTER_NUMBER: "2022bcd0026"
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Display Student Information
      run: |
        echo "=================================================="
        echo "Name: ${{ env.STUDENT_NAME }}"
        echo "Registration Number: ${{ env.REGISTER_NUMBER }}"
        echo "=================================================="
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Train model and extract MSE
      id: train
      run: |
        python train.py
        MSE=$(python -c "import json; print(json.load(open('metrics.json'))['mse'])")
        echo "mse=$MSE" >> $GITHUB_OUTPUT
        echo "Current MSE: $MSE"
    
    - name: Upload model artifact
      uses: actions/upload-artifact@v4
      with:
        name: model-artifact-${{ env.REGISTER_NUMBER }}
        path: |
          model.pkl
          metrics.json
    
    - name: Compare MSE with BEST_MSE
      id: compare
      run: |
        CURRENT_MSE=${{ steps.train.outputs.mse }}
        BEST_MSE=${{ vars.BEST_MSE || '1.0' }}
        
        echo "Current MSE: $CURRENT_MSE"
        echo "Best MSE: $BEST_MSE"
        
        if (( $(echo "$CURRENT_MSE < $BEST_MSE" | bc -l) )); then
          echo "improved=true" >> $GITHUB_OUTPUT
          echo "✅ Model improved! MSE: $CURRENT_MSE < $BEST_MSE"
        else
          echo "improved=false" >> $GITHUB_OUTPUT
          echo "❌ Model did not improve. MSE: $CURRENT_MSE >= $BEST_MSE"
        fi
    
    - name: Skip deployment message
      if: steps.compare.outputs.improved == 'false'
      run: |
        echo "=================================================="
        echo "DEPLOYMENT SKIPPED"
        echo "Name: ${{ env.STUDENT_NAME }}"
        echo "Register Number: ${{ env.REGISTER_NUMBER }}"
        echo "Reason: Model did not improve"
        echo "Current MSE: ${{ steps.train.outputs.mse }}"
        echo "Best MSE: ${{ vars.BEST_MSE || '1.0' }}"
        echo "=================================================="
  
  deploy:
    needs: train-and-evaluate
    runs-on: ubuntu-latest
    if: needs.train-and-evaluate.outputs.improved == 'true'
    env:
      STUDENT_NAME: "Bhanu Reddy"
      REGISTER_NUMBER: "2022bcd0026"
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Download model artifact
      uses: actions/download-artifact@v4
      with:
        name: model-artifact-${{ env.REGISTER_NUMBER }}
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    
    - name: Build and push Docker image
      run: |
        IMAGE_TAG="${{ secrets.DOCKERHUB_USERNAME }}/ml-model-${{ env.REGISTER_NUMBER }}:latest"
        echo "Building image: $IMAGE_TAG"
        
        docker build -t $IMAGE_TAG .
        docker push $IMAGE_TAG
        
        echo "=================================================="
        echo "✅ DEPLOYMENT SUCCEEDED"
        echo "Name: ${{ env.STUDENT_NAME }}"
        echo "Register Number: ${{ env.REGISTER_NUMBER }}"
        echo "Docker Image: $IMAGE_TAG"
        echo "=================================================="
    
    - name: Update BEST_MSE variable
      run: |
        echo "Updating BEST_MSE to ${{ needs.train-and-evaluate.outputs.mse }}"
        # Note: This requires GitHub CLI with appropriate permissions
        # gh variable set BEST_MSE --body "${{ needs.train-and-evaluate.outputs.mse }}"
